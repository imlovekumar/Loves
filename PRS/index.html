<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Passenger Generator</title>
<style>

h2{
    text-align:center;
}
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,Arial,sans-serif;
}

body{
    background:linear-gradient(135deg,#667eea,#764ba2);
    min-height:100vh;
    padding:30px 20px;
}

.container{
    width:100%;
    max-width:90%;
    margin:0 auto;
    background:#fff;
    padding:35px;
    border-radius:18px;
    box-shadow:0 20px 40px rgba(0,0,0,.2);
}

.container h2{
    text-align:center;
    margin-bottom:30px;
    color:#333;
}

.form-group{
    margin-bottom:20px;
}

.form-group label{
    display:block;
    margin-bottom:8px;
    color:#555;
    font-size:15px;
    font-weight:600;
}

.form-group input,
.form-group select{
    width:100%;
    padding:10px 10px;
    border:2px solid #ddd;
    border-radius:12px;
    outline:none;
    font-size:15px;
    background:#fafafa;
    transition:.3s;
}

#trainNumber{
    width:15ch !important;
}
#date {
    width:20ch !important;
} 
#source {
    width:20ch !important;
} 
#destination {
    width:20ch !important;
}
#payment {
    width:29ch !important;
}
#mobile{
	width: 27ch;
}
#bookmarkName{
    width:15ch !important;
}
#coach{
     width:25ch !important;
}
.name{
     width:29ch !important;
}
.age{
     width:12ch !important;
}

.form-group input:hover,
.form-group select:hover{
    border-color:#8b5cf6;
}

.form-group input:focus,
.form-group select:focus{
    border-color:#6c63ff;
    background:#fff;
    box-shadow:0 0 0 4px rgba(108,99,255,.15);
}

.form-group input::placeholder{
    color:#999;
}

select{
    appearance:none;
    cursor:pointer;
    background-repeat:no-repeat;
    background-position:right 15px center;
    background-size:15px;
    padding-right:45px;
}

button{
    
    padding:15px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#667eea,#764ba2);
    color:#fff;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:translateY(-2px);
    box-shadow:0 12px 25px rgba(102,126,234,.35);
}

button:active{
    transform:scale(.98);
}

.row{
    display:flex;
    gap:10px;
    align-items:flex-end;
    margin:8px 0;
	margin-bottom: 10px;
}

.row .form-group{
    margin-bottom:0;
}

textarea{
    width:100%;
    height:260px;
    margin-top:15px;
    font-family:Consolas;
    font-size:15px;
}

.passenger-card{
    background:#fff;
    border:1px solid #ddd;
    border-radius:12px;
    padding:5px 10px;
	margin-bottom: 10px;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
}

input:required:placeholder-shown {
    border: 2px solid red;
    border-radius: 8px;
    outline: none;
}


</style>
</head>

<body>

<div class="container">
    <h2>Add Passenger Details</h2>
    <div class="row">
        <div class="form-group">
        <label><b>Form No.</b></label>
            <select id="bookmarkName" >
                <option>Form 1</option>
                <option>Form 2</option>
                <option>Form 3</option>
                <option>Form 4</option>
                <option>Form 5</option>
                <option>Form 6</option>
                <option>Form 7</option>
                <option>Form 8</option>
                <option>Form 9</option>
                <option>Form 10</option>
            </select>
        </div>

        <div class="form-group">
        <label><b>Class</b></label>
        <select id="coach" >
            <option>3A - THIRD AC</option>
            <option>SL - SLEEPER</option>
            <option>2A - SECOND AC</option>
            <option>1A - FIRST AC</option>
        </select>
        </div>

        <div class="form-group">
            <label><b>No. Of Passenger</b></label>
            <select id="count" onchange="createRows()">
                <option value="">Select</option>
                <option>1</option>
                <option>2</option>
                <option>3</option>
                <option>4</option>
                <option>5</option>
                <option>6</option>
            </select>
        </div>
		
		<a id="bookmarkLink"
            href="#"
            draggable="true"
            style="
            display:none;
            padding:8px 14px;
            background:#1976d2;
            color:#fff;
            text-decoration:none;
            border-radius:12px;
            font-weight:bold;
            white-space:nowrap;">
        </a>
	</div>

    <div id="formArea"></div>
	
    <textarea
        id="output"
        placeholder="Generated text will appear here"
        style="display:none; width:100%; height:260px; margin-top:15px; font-family:Consolas; font-size:15px;">
    </textarea>
</div>

<script>

function createRows(){
    let n=document.getElementById("count").value;
    let div=document.getElementById("formArea");
	div.innerHTML="";
    if(n=="") return;
	div.innerHTML+=`
	<div class="passenger-card">
        <div class="row">        
            <div class="form-group">
                <label>Train Number</label>
                <input 
                    type="number"
                    id="trainNumber" 
                    placeholder="Train No."
                    maxlength="5"
                    pattern="[0-9]{5}"
                    oninput="this.value = this.value.replace(/\D/g, '').slice(0, 5)"
                    required>
            </div>
			
			
            <div class="form-group">
                <label>Journey Date</label>
                <input 
                    type="date"
                    id="date"
                    placeholder="Date of Journey"
                    maxlength="10"
                    inputmode="numeric"
                    required>		    
            </div>
        
            <div class="form-group">
                <label>From Station</label>
                <input 
                    type="text" 
                    placeholder="Enter station"
                    id="source"
                    maxlength="6"
                    oninput="
                            this.value=this.value.replace(/[^A-Za-z]/g,'');
                            this.value = this.value.toUpperCase();
                            "
                    required>
            </div>

            <div class="form-group">
                <label>To Station</label>
                <input 
                    type="text"
                    placeholder="Enter station"
                    id="destination"
                    maxlength="6"
                    oninput="
                            this.value=this.value.replace(/[^A-Za-z]/g,'');
                            this.value = this.value.toUpperCase();
                            "
                    required>
            </div>
		</div>
	</div>	
		
	`;
	
	div.innerHTML +=`
	<div class="passenger-card">
	<label>Passenger Details</label>
    	<div id="passengers"></div>
	</div>
	`;
	const pcard = document.getElementById("passengers");

    for (let i = 1; i <= n; i++) {
    pcard.innerHTML += `
       
        <div class="row">
            
            <div class="form-group">
                <input
                    type="text"
                    class="name"
                    placeholder="Passenger ${i} Name"
                    minlength="3"
                    maxlength="16"
                    required
                    oninput="
                            this.value=this.value.replace(/[^A-Za-z ]/g,'');
                            this.value = this.value.toUpperCase();
                            ">
            </div>

            <div class="form-group">
                <select class="gender">
                    <option>Male</option>
                    <option>Female</option>
                    <option>Transgender</option>
                </select>
            </div>

            <div class="form-group">
                <input
                    type="number"
                    class="age"
                    placeholder="Age"
                    min="1"
                    max="125"
                    required
                    oninput="
                        if(this.value>125)this.value=125;
                        if(this.value<1 && this.value!='')this.value=1;">
            </div>

            <div class="form-group">
                <select class="berth">
                    <option>No Preference</option>
                    <option>Lower (LB)</option>
                    <option>Middle (MB)</option>
                    <option>Upper (UB)</option>
                    <option>Side Lower (SL)</option>
                    <option>Side Upper (SU)</option>
                </select>
            </div>

        </div>
    `;}

    div.innerHTML+=`
	<div class="passenger-card">
        <div class="row">
            <div class="form-group">
			<label>Payment Mode</label>
                <select id="payment">
                    <option>Cash</option>
                    <option>UPI/BHIM QR</option>
                </select>
            </div>

            <div class="form-group">
			<label>Mobile Number</label>
                <input
                    class="mobile"
                    id="mobile"
                    type="number"
                    maxlength="10"
                    placeholder="Mobile Number"
                    required
                    oninput="this.value=this.value.replace(/\\D/g,'').slice(0,10)">
            </div>
    		</div>
        </div>
	`;
	div.innerHTML+=`
        <button id="generate-btn" onclick="generate()">Generate</button>
        <button onclick="copyText()">Copy</button>
        <button onclick="clearAll()">Clear</button>
        
    
    `;
	setTomorrowDate();
}

// The action your generate button performs 
function generateFunctions() { alert('Generate button was triggered!'); }

// The keyboard shortcut listener 
window.addEventListener('keydown', function(event) { 
    if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === 's') { 
        event.preventDefault(); // Stops browser save window 
        document.getElementById('generate-btn').click(); // Clicks your button
    } 
});

function setTomorrowDate() {
    const tomorrow = new Date();
    tomorrow.setDate(tomorrow.getDate() + 1);
    document.getElementById('date').valueAsDate = tomorrow;
}

function generate(){
	
	let coach=document.getElementById("coach").value;
	let train=document.getElementById("trainNumber").value;
    let source=document.getElementById("source").value;
    let destination=document.getElementById("destination").value;
    let doj=document.getElementById("date").value;

    const originalDate = doj;
    const [year, month, day] = originalDate.split("-");
    const formattedDate = `${day}.${month}.${year}`;

    let names=document.querySelectorAll(".name");
    let genders=document.querySelectorAll(".gender");
    let ages=document.querySelectorAll(".age");
    let berth=document.querySelectorAll(".berth");
    let payment=document.getElementById("payment").value;
    let mobile=document.getElementById("mobile").value;
	// Validate passenger details
	
	if (train === "") {
        alert("Please enter the Train Number");        
        document.getElementById("trainNumber").focus();
        return;
    }

    if (!/^\d{5}$/.test(train)) {
        alert("Train Number must be exactly 5 digits.");
        document.getElementById("train").focus();
        return;
    }

	if (doj === "") {
        alert("Please enter Date Of Journey");
        document.getElementById("date").focus();
        return;
    }
	if (source === "") {
        alert("Please enter Source Station");
        document.getElementById("source").focus();
        return;
    }
	if (destination === "") {
        alert("Please enter Destination Station");
        document.getElementById("destination").focus();
        return;
    }

	for (let i = 0; i < names.length; i++) {

    		let name = names[i].value.trim();
    		let age = ages[i].value.trim();
    		if (name === "") {
        		alert("Please enter Name for Passenger " + (i + 1));
        		names[i].focus();
        		return;
    		}

    if (name.length < 3 || name.length > 16) {
        alert("Passenger " + (i + 1) + " name must be between 3 and 16 characters.");
        names[i].focus();
        return;
    }
	
	if (!/^[A-Za-z ]+$/.test(name)) {
    		alert("Passenger " + (i + 1) + " name can contain only alphabets.");
    		names[i].focus();
    		return;
	}

    if (age === "") {
        alert("Please enter Age for Passenger " + (i + 1));
        ages[i].focus();
        return;
    }
	
	let ageValue = parseInt(age);
	if (isNaN(ageValue) || ageValue < 1 || ageValue > 125) {
    		alert("Passenger " + (i + 1) + " age must be between 1 and 125.");
    		ages[i].focus();
    		return;
	}
}

if (mobile === "") {
    alert("Please enter Mobile Number.");
    document.getElementById("mobile").focus();
    return;
}

if (!/^\d{10}$/.test(mobile)) {
    alert("Mobile Number must be exactly 10 digits.");
    document.getElementById("mobile").focus();
    return;
}
 
	let text="javascript: ( async function () {\n const passengers = [\n";
    for(let i=0;i<names.length;i++){

       	text+=`    {\n`;
		text+=`        name: "${names[i].value}", gender: "${genders[i].value}", age: "${ages[i].value}"\n`;
		text+=`    }`;

        if(i!=names.length-1)
            text+=",";

        text+="\n";
    }

    text+=`];\n`;

	text+=`const TrainNo = "${train}";\n`;
	text+=`const JDate = "${formattedDate}";\n`;
    text+=`const from = "${source}";\n`;
    text+=`const to = "${destination}";\n`;
    text+=`const coach = "${coach}";\n`;
    text+=`const mobileNumber = "${mobile}";\n`;
    text+=`const PaymentMode = "${payment}";`;
	text+="\n\n";
	const afterText = `YOUR ending TEXT HERE`;
	text += afterText;
	
	let bookmarkName = document.getElementById("bookmarkName").value.trim();
	if (bookmarkName === "") {
    		alert("Please enter Bookmark Name.");
    		document.getElementById("bookmarkName").focus();
    		return;
	}
	let link = document.getElementById("bookmarkLink");
	link.href = text;
	link.textContent = "📑 " + bookmarkName;
	link.style.display = "inline-block";

    document.getElementById("output").value=text;
	document.getElementById("output").style.display = "block";
}


function copyText(){

    let txt=document.getElementById("output");
    txt.select();
    txt.setSelectionRange(0,99999);
    navigator.clipboard.writeText(txt.value);
    alert("Copied to Clipboard");
}

function clearAll() {
    const output = document.getElementById("output");
    const bookmarkLink = document.getElementById("bookmarkLink");

    document.getElementById("count").selectedIndex = 0;
    document.getElementById("formArea").innerHTML = "";

    output.value = "";
    output.style.display = "none";

    bookmarkLink.style.display = "none";
    bookmarkLink.href = "#";
}

</script>
</body>
</html>
