<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tatkal Booking Interface</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #f4f4f6;
            padding: 40px;
            display: grid;
            justify-content: space-evenly;
        }

        .booking-container {
            width: 100%;
            background-color: #fbf8fa;
            border: 1px solid #dcd1db;
            border-radius: 4px;
            overflow: hidden;
			box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.2), 0 6px 20px 0 rgba(0, 0, 0, 0.19);
            
        }

        /* Top Header Title */
        .main-header {
            background-color: #f3eef4;
            padding: 8px 16px;
            color: #0f1c5d;
            font-weight: bold;
            font-size: 14px;
        }
		
		.button-Area {
			max-width: 100%;
			padding: 4px;
			display: grid;
			place-items: center;
			grid-template-columns: 1fr 1fr 1fr;
            background-color: #f3eef4;
           	
        }
  
        /* Journey Info Grid Bar */
        .journey-info-bar {
            display: grid;
			grid-template-columns: .7fr .8fr 1.1fr 1.3fr 1.3fr;
            background-color: #ffffff;
            border-bottom: 1px solid #e2e8f0;
            padding: 12px 16px;
            gap: 10px;
        }
		
		.journey-info-bar2{
            display: grid;
			grid-template-columns: 1fr .8fr .9fr 1.2fr;
            background-color: #ffffff;
            padding: 12px 16px;
            gap: 10px;
        }
		.extras-info-bar {
			display: grid;
			grid-template-columns: .8fr 1.2fr 1fr;
            background-color: #ffffff;
            padding: 12px 16px;
            gap: 10px;
		}

        .info-block {
            display: flex;
            flex-direction: column;
        }

        .info-label {
            font-size: 10px;
            color: #1a365d;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        
        /* Passenger List Section */
        .passenger-section {
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .passenger-row {
            display: flex;
            background-color: #f7fafc;
            border: 1px solid #e2e8f0;
            border-radius: 4px;
            overflow: hidden;
            align-items: stretch;
			box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.2), 0 6px 20px 0 rgba(0, 0, 0, 0.19);
        }
		
        .passenger-index {
            background-color: #ffffff;
            border-right: 1px solid #e2e8f0;
            padding: 10px 6px;
            font-size: 11px;
            font-weight: bold;
            color: #2d3748;
            writing-mode: vertical-rl;
            transform: rotate(180deg);
            text-align: center;
            white-space: nowrap;
        }

        .passenger-inputs {
            display: grid;
            grid-template-columns: minmax(0,1.5fr) minmax(0,1fr) minmax(0,.6fr) minmax(0,1.5fr) minmax(0,1.2fr);
            gap: 12px;
            padding: 10px;
            width: 100%;
            align-items: center;
        }

        /* Form elements styling */
        .input-group {
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .mobile-input {
            display: flex;
            flex-direction: row;
            position: relative;
        }

        .input-label-top {
            font-size: 10px;
            color: #718096;
            margin-bottom: 1px;
            font-weight: 500;
        }

        .form-control {
            width: 100%;
            border: none;
            border-bottom: 1px solid #a0aec0;
            background: transparent;
            padding: 4px 4px;
            font-size: 13px;
            color: #2d3748;
            outline: none;
        }

        .form-control:focus {
            border-bottom: 1px solid red;
        }

        select.form-control {
            appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path fill='%234A5568' d='M0 0l5 5 5-5z'/></svg>");
            background-repeat: no-repeat;
            background-position: right 4px center;
            padding-right: 16px;
        }

        .name-input::placeholder {
            color: #a0aec0;
        }
                    
        .modern-btn{
            width: 80%;
            padding: 10px;
            border:none;
            margin: 10px;
            background-color: #e23b8c;
            color:#0f1c5d;
            font-size:16px;
            font-weight:600;
            letter-spacing:.5px;
            cursor:pointer;
            transition:all .25s ease;
            box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.2), 0 6px 20px 0 rgba(0, 0, 0, 0.19);
        }

        #bookmarkLink {
            width: 80%;
            padding: 10px;
            border:none;
            margin: 10px;
            background-color: #bbbbbb;
            color:#0f1c5d;
            font-size:16px;
            font-weight:600;
            letter-spacing:.5px;
            text-align: center;
            text-decoration: none;
            cursor:pointer;
            transition:all .25s ease;
            box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.2), 0 6px 20px 0 rgba(0, 0, 0, 0.19);
        }

        #bookmarkLink[draggable="true"] {
            background-color: #007bff;       /* New color when enabled (e.g., bright blue) */
            font-weight: bold;    /* Optional: visual cue */
            cursor: grab;         /* Shows hand icon for dragging */
        }

        .modern-btn:hover{
            transform:translateY(-2px);
            box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.2), 0 6px 20px 0 rgba(0, 0, 0, 0.19);
        }

        .modern-btn:active{
            transform:translateY(1px) scale(.98);
            box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.2), 0 6px 20px 0 rgba(0, 0, 0, 0.19);
                    }

        .modern-btn:focus{
            outline:none;
            box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.2), 0 6px 20px 0 rgba(0, 0, 0, 0.19);
                    }

        #outputBox {
            display: none; 
            border: 1px solid #ccc;
            border-radius: 4px;
            padding: 10px;
            max-width: 1200px;
            background-color: #f9f9f9;
            margin-top: 15px;
        }

        summary {
            font-weight: bold;
            cursor: pointer;
        }

        textarea {
            width: 100%;
            height: 100px;
            margin-top: 10px;
            box-sizing: border-box;
        }
		
		#bookmarkLink:hover{
            transform:translateY(-2px);
            box-shadow:0 10px 24px rgba(37,99,235,.35);
        }

        #bookmarkLink:active{
            cursor:grabbing;
            transform:scale(.98);
        }

        .jour-container{
            display:flex;
            width:100%;
            border:none;
            overflow:hidden;
            border-bottom: 1px solid #e2e8f0;
            border-top: 1px solid #e2e8f0;
        }

        .left{
            padding: 10px 6px;
            font-size: 11px;
            font-weight: bold;
            color: #2d3748;
            writing-mode: vertical-rl;
            transform: rotate(180deg);
            text-align: center;
            white-space: nowrap;
            border-left: 1px solid #e2e8f0;
            box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.2), 0 6px 20px 0 rgba(0, 0, 0, 0.19);
        }

        .right{
            flex:1;
            display:flex;
            flex-direction:column;
        }

</style>
</head>
<body>

<div class="booking-container">
	<div class="main-header">KONDAPURAM BOOKING FORM</div>
	
    <div class="jour-container">
        <div class="left">Journey Details</div>
	    <div class="right">
	        <div class="journey-info-bar">
	            <div class="info-block">
                    <span class="info-label">Form No.</span>
                    <div class="input-group">
                        <select class="form-control" id="bookmarkName" onchange="updateButtonText()">
                            <option>Form 1</option>
                                <option>Form 2</option>
                                <option>Form 3</option>
                                <option>Form 4</option>
                                <option>Form 5</option>
                                <option>Form 6</option>
                                <option>Form 7</option>
                                <option>Form 8</option>
                                <option>Form 9</option>
                                <option>Form 10</option>
                        </select>
                    </div>
                </div>
                <div class="info-block">
                    <span class="info-label">Train No.</span>
                    <div class="input-group">
                            <input
                            class="form-control"
                            type="number"
                                id="trainNumber" 
                                placeholder="17216"
                                maxlength="5"
                                pattern="[0-9]{5}"
                                oninput="this.value = this.value.replace(/\D/g, '').slice(0, 5)"
                                required>
                    </div>
                </div>
                <div class="info-block">
                    <span class="info-label">Date of Journey 📅</span>
                    <div class="monile-input">
                            <input 
                            type="text" 
                            id="date"
                            class="form-control" 
                            placeholder="Journey Date"
                            maxlength="10"
                            oninput="formatDate(this)"
                                required>
                        <span style="border-bottom: 1px solid #a0aec0;">📱</span>
                    </div>
                </div>
                <div class="info-block">
                    <span class="info-label">From Station</span>
                    <div class="input-group">
                        <input 
                        type="text" 
                        class="form-control"
                        id="source"
                        placeholder="KDP"
                        maxlength="6"
                            oninput="
                            this.value=this.value.replace(/[^A-Za-z]/g,'');
                            this.value = this.value.toUpperCase();
                            document.getElementById('brdStn').value = this.value;"
                        required>
                    </div>
                </div>
                <div class="info-block">
                    <span class="info-label">To Station</span>
                    <div class="input-group">
                        <input 
                        type="text" 
                        class="form-control" 
                        placeholder="BZA"
                        id="destination"
                        maxlength="6"
                            oninput="
                            this.value=this.value.replace(/[^A-Za-z]/g,'');
                                this.value = this.value.toUpperCase();"
                        required>
                    </div>
                </div>
            </div>
	
            <div class="journey-info-bar2">
                <div class="info-block">
                    <span class="info-label">Journey Class</span>
                    <div class="input-group">
                        <select class="form-control" id="coach">
                            <option>3A - THIRD AC</option>
                                <option>SL - SLEEPER</option>
                                <option>2A - SECOND AC</option>
                                <option>1A - FIRST AC</option>
                            </select>
                    </div>
                </div>
		        <div class="info-block">
        		    <span class="info-label">Quota</span>
			        <div class="input-group">
				        <select class="form-control" disabled>
					        <option>Tatkal</option>
            			    <option>General</option>
            			    <option>Premium Tatkal</option>
                        </select>
         	        </div>
                </div>
                <div class="info-block">
                    <span class="info-label">No. of Passenger</span>
                    <div class="input-group">
                        <select id="count" onchange="createPassRows()" class="form-control">
                            <option>1</option>
                            <option>2</option>
                            <option>3</option>
                            <option>4</option>
                            <option>5</option>
                            <option>6</option>	
                        </select>
                    </div>
                </div>
                <div class="info-block">
                    <span class="info-label">Boarding Station</span>
                    <div class="input-group">
                            <input 
                                type="text" 
                                class="form-control" 
                                id="brdStn"
                                placeholder="Boarding Station"
                                disabled>
                    </div>
                </div>
            </div>
	    </div>
    </div>

    <div id="passArea" class="passenger-section"></div>
	
	<div class="jour-container">
        <div class="left">Extras</div>
		<div class="right">
			<div class="extras-info-bar">
				<div class="info-block">
                    <span class="info-label">Payment Mode</span>
					<div class="input-group">
					    <select id="payment" class="form-control">
						    <option>Cash</option>
                			<option>UPI/BHIM QR</option>
					    </select>
                    </div>
				</div>
				<div class="info-block">
                    <span class="info-label">10 Digit Mobile</span>
					<div class="mobile-input">
                        <span style="border-bottom: 1px solid #a0aec0;">📱</span>
                		<input 
						type="number"
						id="mobile"
						class="form-control"
						maxlength="10"
                    		placeholder="Mobile Number"
                    		oninput="this.value=this.value.replace(/\\D/g,'').slice(0,10)">
                    </div>
				</div>
				<div class="info-block">
                    <span class="info-label">Coach Option</span>	
					<div class="input-group">
                		<input 
						type="text"
						id="wagon"
						class="form-control"
						maxlength="4"
                    		placeholder="Coach No." disabled>
                    </div>
				</div>
			</div>
		</div>
	</div>

	<div id="buttonArea" class="button-Area">
		<button class="modern-btn" onclick="generate()">Save</button>
		<button class="modern-btn" onclick="clearAll()">Reset</button>
		<a id="bookmarkLink" href="#" draggable="false"></a>
	</div>
</div>

<details id="outputBox">
	<summary>Click here to Check Details</summary>
    <div class="textarea-container">
        <textarea id="output"></textarea>
    </div>
</details>

<script>

document.addEventListener("DOMContentLoaded", function() {
	createPassRows();
	setTomorrowDate();
	updateButtonText();
	document.getElementById("trainNumber").focus();
});

function updateButtonText() {
    var select = document.getElementById("bookmarkName");
    var button = document.getElementById("bookmarkLink");
    var selectedText = select.options[select.selectedIndex].text;
    button.textContent = selectedText;
}

function createPassRows() {
	let n = parseInt(document.getElementById("count").value);
    let div = document.getElementById("passArea");
	div.innerHTML="";
    if(isNaN(n) || n<1) return;
	
	let htmlRows = [];
	for (let i = 1; i <= n; i++) {
        htmlRows.push(`
            <div class="passenger-row">
                <div class="passenger-index">Psgn #0${i}</div>
                <div class="passenger-inputs">
                    <div class="input-group">
                        <span class="input-label-top">Passenger Name</span>
                        <input 
                            type="text" 
                            class="form-control name-input name" 
                            placeholder="Name"
                            minlength="3"
                            maxlength="16"
                            required
                            oninput="
                                    this.value=this.value.replace(/[^A-Za-z ]/g,'');
                                    this.value = this.value.toUpperCase();
                                    this.value = this.value.replace(/ {2,}/g, ' ');">
                    </div>
                    <div class="input-group">
                        <span class="input-label-top">Gender</span>
                        <select class="form-control gender">
                            <option>Male</option>
                            <option>Female</option>
                            <option>Transgender</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <span class="input-label-top">Age</span>
                        <input 
                            type="number" 
                            class="form-control age" 
                            placeholder="AGE"
                            min="1"
                            max="125"
                            required
                            oninput="
                                    if(this.value>125)this.value=125;
                                    if(this.value<1 && this.value!='')this.value=1;">
                    </div>
                    <div class="input-group">
                        <span class="input-label-top">Berth Preference</span>
                        <select class="form-control berth">
                            <option>No Preference</option>
                            <option>Lower (LB)</option>
                            <option>Middle (MB)</option>
                            <option>Upper (UB)</option>
                            <option>Side Lower (SL)</option>
                            <option>Side Upper (SU)</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <span class="input-label-top">Country</span>
                        <input type="text" class="form-control" value="India" disabled>
                    </div>
                </div>
            </div>
        `);
    }
	div.innerHTML = htmlRows.join('');
}

function setTomorrowDate() {
    const today = new Date();
	const tomorrow = new Date(today.getTime() + 24 * 60 * 60 * 1000);
	const ist = tomorrow.toLocaleDateString('en-IN', {
        timeZone: 'Asia/Kolkata',
        year: 'numeric',
        month: '2-digit',
        day: '2-digit'
  	});
	//console.log(today);
    const [day, month,year] = ist.split("/");
    const formattedDate = `${day}.${month}.${year}`;
	document.getElementById('date').value = formattedDate;
}

function formatDate(input) {
    let value = input.value.replace(/\D/g, "").substring(0, 8);
    let formatted = "";
	if (value.length > 0)
        formatted += value.substring(0, 2);
    if (value.length > 2)
        formatted += "." + value.substring(2, 4);
    if (value.length > 4)
        formatted += "." + value.substring(4, 8);
    input.value = formatted;
}

function generate(){
	
	let coach=document.getElementById("coach").value;
	let train=document.getElementById("trainNumber").value;
    let source=document.getElementById("source").value;
    let destination=document.getElementById("destination").value;
    let doj=document.getElementById("date").value;
    let names=document.querySelectorAll(".name");
    let genders=document.querySelectorAll(".gender");
    let ages=document.querySelectorAll(".age");
    let berth=document.querySelectorAll(".berth");
    let payment=document.getElementById("payment").value;
    let mobile=document.getElementById("mobile").value;
	// Validate passenger details
	
	if (train === "") {
        alert("Please enter the Train Number");        
        document.getElementById("trainNumber").focus();
        return;
    }

    if (!/^\d{5}$/.test(train)) {
        alert("Train Number must be exactly 5 digits.");
        document.getElementById("trainNumber").focus();
        return;
    }

	if (doj === "") {
        alert("Please enter Date Of Journey");
        document.getElementById("date").focus();
        return;
    }
	if (source === "") {
        alert("Please enter Source Station");
        document.getElementById("source").focus();
        return;
    }
	if (destination === "") {
        alert("Please enter Destination Station");
        document.getElementById("destination").focus();
        return;
    }
	
	if ( source === destination ) {
		alert("Source & Destination Cannot be the Same Station");
        document.getElementById("destination").focus();
        return;
	}

	for (let i = 0; i < names.length; i++) {

        let name = names[i].value.trim();
        let age = ages[i].value.trim();
        if (name === "") {
            alert("Please enter Name for Passenger " + (i + 1));
            names[i].focus();
            return;
        }

        if (name.length < 3 || name.length > 16) {
            alert("Passenger " + (i + 1) + " name must be between 3 and 16 characters.");
            names[i].focus();
            return;
        }
        
        if (!/^[A-Za-z ]+$/.test(name)) {
            alert("Passenger " + (i + 1) + " name can contain only alphabets.");
            names[i].focus();
            return;
        }

        if (age === "") {
            alert("Please enter Age for Passenger " + (i + 1));
            ages[i].focus();
            return;
        }
        
        let ageValue = parseInt(age);
        if (isNaN(ageValue) || ageValue < 1 || ageValue > 125) {
            alert("Passenger " + (i + 1) + " age must be between 1 and 125.");
            ages[i].focus();
            return;
        }
    }


    if (mobile !== "" && !/^\d{10}$/.test(mobile)) {
        alert("Mobile Number must be exactly 10 digits.");
        document.getElementById("mobile").focus();
        return;
    }
 
	let text="javascript: ( async function () {\n const passengers = [\n";
    for(let i=0;i<names.length;i++){
       	text+=`    {\n`;
		text+=`        name: "${names[i].value}", gender: "${genders[i].value}", age: "${ages[i].value}", berth: "${berth[i].value}"\n`;
		text+=`    }`;
        if(i!=names.length-1)
            text+=",";
            text+="\n";
    }
    text+=`];\n`;
	text+=`const TrainNo = "${train}";\n`;
	text+=`const JDate = "${doj}";\n`;
    text+=`const from = "${source}";\n`;
    text+=`const to = "${destination}";\n`;
    text+=`const coach = "${coach}";\n`;
    text+=`const mobileNumber = "${mobile}";\n`;
    text+=`const PaymentMode = "${payment}";`;
	text+="\n\n";
	const afterText = `YOUR ending TEXT HERE`;
	text += afterText;
	
	let bookmarkName = document.getElementById("bookmarkName").value.trim();
	if (bookmarkName === "") {
        alert("Please enter Bookmark Name.");
        document.getElementById("bookmarkName").focus();
        return;
	}
	let link = document.getElementById("bookmarkLink");
	link.href = text;
	link.setAttribute('draggable', 'true');

    document.getElementById("output").value = text;
	document.getElementById("outputBox").style.display = "block";
}

function clearAll() {
    const output = document.getElementById("output");
    const outputBox = document.getElementById("outputBox");
	const bookmarkLink = document.getElementById("bookmarkLink");

    document.getElementById("count").selectedIndex = 0;
	createPassRows();
	
    output.value = "";
	outputBox.open= false;
    outputBox.style.display = "none";

    bookmarkLink.href = "#";
	bookmarkLink.setAttribute('draggable', 'false');
    updateButtonText();
}
	
</script>
</body>
</html>
