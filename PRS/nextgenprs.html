<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1280">
<title>Tatkal Booking Interface</title>
<style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    body {
        background:#eef2f7;
        background-color: #f4f4f6;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: space-evenly;
    }

    .booking-container {
        width: 100%;
        max-width: 60%;
        margin-top: 60px;
        background-color: #fbf8fa;
        border: 1px solid #dcd1db;
        border-radius: 4px;
        overflow: hidden;
        box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.2), 0 6px 20px 0 rgba(0, 0, 0, 0.19);
    }

    /* Top Header Title */
    .main-header {
        display: flex;
        flex-direction: row;
        position: relative;
        background-color: #f3eef4;
        padding: 8px 16px;
        color: #0f1c5d;
        font-weight: bold;
        font-size: 14px;
    }

    .button-Area {
        max-width: 100%;
        padding: 12px;
        display: grid;
        place-items: center;
        grid-template-columns: 1fr 1fr 1fr;
        background-color: #f3eef4;
    }

    /* Journey Info Grid Bar */
    .journey-info-bar {
        display: grid;
        grid-template-columns: .7fr .8fr 1.1fr 1.3fr 1.3fr;
        background-color: #ffffff;
        border-bottom: 1px solid #e2e8f0;
        padding: 12px 16px;
        gap: 10px;
    }

    .journey-info-bar2{
        display: grid;
        grid-template-columns: 1fr .8fr .9fr 1.2fr;
        background-color: #ffffff;
        padding: 12px 16px;
        gap: 10px;
    }
    .extras-info-bar {
        display: grid;
        grid-template-columns: .8fr 1.2fr 1fr;
        background-color: #ffffff;
        padding: 12px 16px;
        gap: 10px;
    }

    .info-block {
        display: flex;
        flex-direction: column;
    }

    .info-label {
        display: flex;
        flex-direction: row;
        position: relative;
        padding: 3px;
        place-items: center;
        font-size: 10px;
        color: #374151;
        font-weight: bold;
        text-transform: uppercase;
        margin-bottom: 4px;
        height: 16px;
    }

    .input-label-top {
        display: flex;
        flex-direction: row;
        position: relative;
        padding: 3px;
        place-items: center;
        height: 16px;

        font-size: 10px;
        color: #718096;
        margin-bottom: 1px;
        font-weight: 500;
    }

    .switch{
        position:relative;
        width:26px;
        height: 16px;
        margin-right: 6px;
    }

    .switch input{
        display:none;
    }

    .slider{
        position:absolute;
        inset:0;
        background:#d1d5db;
        border-radius:50px;
        cursor:pointer;
        transition:.25s;
    }

    .slider::before{
        content:"";
        position:absolute;
        width:10px;
        height:10px;
        left:3px;
        top:3px;
        background:#fff;
        border-radius:50%;
        box-shadow:0 2px 6px rgba(0,0,0,.2);
        transition:.25s;
    }

    .switch input:checked + .slider{
        background:#2563eb;
    }

    .switch input:checked + .slider::before{
        transform:translateX(9px);
    }

    /* Passenger List Section */
    .passenger-section {
        padding: 10px;
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    .passenger-row {
        display: flex;
        background-color: #f7fafc;
        border: 1px solid #e2e8f0;
        border-radius: 4px;
        overflow: hidden;
        align-items: stretch;
        box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.2), 0 6px 20px 0 rgba(0, 0, 0, 0.19);
    }

    .passenger-index {
        background-color: #ffffff;
        border-right: 1px solid #e2e8f0;
        padding: 10px 6px;
        font-size: 11px;
        font-weight: bold;
        color: #2d3748;
        writing-mode: vertical-rl;
        transform: rotate(180deg);
        text-align: center;
        white-space: nowrap;
        box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.2), 0 6px 20px 0 rgba(0, 0, 0, 0.19);
    }

    .passenger-inputs {
        display: grid;
        grid-template-columns: minmax(0,1.5fr) minmax(0,1fr) minmax(0,.6fr) minmax(0,1.5fr) minmax(0,1.2fr);
        gap: 12px;
        padding: 10px;
        width: 100%;
        align-items: center;
    }

    /* Form elements styling */
    .input-group {
        display: flex;
        flex-direction: column;
        position: relative;
    }

    .mobile-input {
        display: flex;
        flex-direction: row;
        position: relative;
    }

    .form-control {
        width: 100%;
        border: none;
        border-bottom: 1px solid #a0aec0;
        background: transparent;
        padding: 4px 4px;
        font-size: 13px;
        color: #2d3748;
        outline: none;
    }

    .form-control:focus {
        border-bottom: 1px solid red;
    }

    select.form-control {
        appearance: none;
        background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path fill='%234A5568' d='M0 0l5 5 5-5z'/></svg>");
        background-repeat: no-repeat;
        background-position: right 4px center;
        padding-right: 16px;
    }

    .name-input::placeholder {
        color: #a0aec0;
    }
    
    .modern-btn{
        width: 82%;
        height: 46px;
        border: 1px solid #d8dce6;
        border-radius: 12px;
        background: linear-gradient(180deg,#ffffff,#f5f7fb);
        color:#1f2937;
        font-size:15px;
        font-weight:600;
        letter-spacing:.3px;
        cursor:pointer;
        display:flex;
        justify-content:center;
        align-items:center;
        transition:all .22s ease;
        box-shadow:
        0 2px 8px rgba(0,0,0,.08),
        inset 0 1px 0 rgba(255,255,255,.9);
    }

    .modern-btn:hover   {
        transform:translateY(-2px);
        background:linear-gradient(180deg,#ffffff,#eef4ff);
        border-color:#2563eb;
        color:#2563eb;
        box-shadow:
        0 8px 18px rgba(37,99,235,.20);
    }

    .modern-btn:active{
        transform:translateY(1px) scale(.98);
        box-shadow:
        inset 0 2px 6px rgba(0,0,0,.15);
    }

    .modern-btn:focus{
        outline:none;
        border-color:#2563eb;
        box-shadow:
        0 0 0 4px rgba(37,99,235,.15);
    }

    #bookmarkLink{
        width:82%;
        height:46px;
        display:flex;
        justify-content:center;
        align-items:center;
        border-radius:12px;
        border:1px dashed #2563eb;
        background:#eef5ff;
        color:#1f2937;
        font-size:15px;
        font-weight:600;
        text-decoration:none;
        transition:.22s;
    }

    #bookmarkLink:hover{
        background:#2563eb;
        color:#fff;
        border-style:solid;
        transform:translateY(-2px);
        box-shadow:0 8px 18px rgba(37,99,235,.25);
    }

    #bookmarkLink:active{
        transform:scale(.98);
    }


    #bookmarkLink[draggable="true"] {
        background-color: #007bff;       /* New color when enabled (e.g., bright blue) */
        font-weight: bold;    /* Optional: visual cue */
        cursor: grab;         /* Shows hand icon for dragging */
    }

    #outputBox {
        width: 60%;
        display: none;
        border: 1px solid #ccc;
        border-radius: 4px;
        padding: 10px;
        max-width: 1200px;
        background-color: #f9f9f9;
        margin-top: 15px;
        box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.2), 0 6px 20px 0 rgba(0, 0, 0, 0.19);
    }

    summary {
        font-weight: bold;
        cursor: pointer;
    }

    textarea {
        width: 100%;
        height: 100px;
        margin-top: 10px;
        box-sizing: border-box;
    }

    .jour-container{
        display:flex;
        width:100%;
        border:none;
        overflow:hidden;
        border-bottom: 1px solid #e2e8f0;
        border-top: 1px solid #e2e8f0;
    }

    .left{
        padding: 10px 6px;
        font-size: 11px;
        font-weight: bold;
        color: #2d3748;
        writing-mode: vertical-rl;
        transform: rotate(180deg);
        text-align: center;
        white-space: nowrap;
        border-left: 1px solid #e2e8f0;
        box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.2), 0 6px 20px 0 rgba(0, 0, 0, 0.19);
    }

    .right{
        flex:1;
        display:flex;
        max-width: 100%;
        flex-direction:column;
    }

    
    /* Put your whole webpage inside this */
    #page{
        transition:.45s;
    }

    /* Locked state */
    body.locked #page{
        filter:blur(1px);
        user-select:none;
        pointer-events:none;
    }

    /* ===========================
    OVERLAY
    =========================== */

    #overlay{
        position:fixed;
        inset:0;
        background:rgba(0,0,0,.35);
        backdrop-filter:blur(2px);
        display:flex;
        justify-content:center;
        align-items:center;
        z-index:99999;
        transition:.35s;
    }

    body.unlocked #overlay{
        opacity:0;
        visibility:hidden;
    }

    /* ===========================
    POPUP
    =========================== */

    .lock-box{
        width:360px;
        padding:35px;
        border-radius:22px;
        background:rgba(255,255,255,.18);
        border:1px solid rgba(255,255,255,.35);
        backdrop-filter:blur(20px);
        box-shadow:
        0 20px 60px rgba(0,0,0,.25);
        text-align:center;
        animation:popup .45s ease;
    }

    @keyframes popup{
        from {
            transform:translateY(30px) scale(.9);
            opacity:0;
        }

        to  {
            transform:none;
            opacity:1;
        }
    }

    .lock-icon{
        font-size:60px;
        margin-bottom:15px;
    }

    h2  {
        color:white;
        margin-bottom:25px;
        font-weight:600;
    }

    /* ===========================
    INPUT PASSWORD
    =========================== */
    #password{
        width:100%;
        height:48px;
        border:none;
        outline:none;
        border-radius:12px;
        padding:0 16px;
        font-size:16px;
        background:white;
        margin-bottom:18px;
    }

    /* ===========================
    BUTTON
    =========================== */

    #login-btn{
        width:100%;
        height:48px;
        border:none;
        border-radius:12px;
        cursor:pointer;
        color:white;
        font-size:16px;
        font-weight:600;
        background:linear-gradient(135deg,#0078ff,#00b4ff);
        transition:.25s;
    }

    #login-btn:hover{
        transform:translateY(-2px);
        box-shadow:0 10px 25px rgba(0,120,255,.35);
    }

    #error{
        margin-top:14px;
        color:#ffb3b3;
        height:18px;
        font-size:14px;
    }

    /* Shake animation */

    .shake{
        animation:shake .35s;
    }

    @keyframes shake{
        10%{transform:translateX(-8px);}
        20%{transform:translateX(8px);}
        30%{transform:translateX(-8px);}
        40%{transform:translateX(8px);}
        50%{transform:translateX(-6px);}
        60%{transform:translateX(6px);}
        70%{transform:translateX(-4px);}
        80%{transform:translateX(4px);}
        100%{transform:none;}
    }

    body.unlocked .logout-btn{
        display:block;
    }

    .logout-btn{
        display:none;    
        margin-left:auto;
        background:none;
        border:none;
        padding:0;
        color: black;
        font-size:15px;
        font-weight:600;
        cursor:pointer;
        text-decoration:none;
        transition:.2s;   
    }

    .logout-btn:hover{
        transform:translateY(-2px);
        box-shadow:0 12px 25px rgba(255,0,0,.35);
    }
</style>
</head>
<body class="locked">
    <div class="booking-container" id="page">
        <div class="main-header">KONDAPURAM BOOKING FORM
            <button class="logout-btn" onclick="logout()">🔒︎</button>
        </div>
        <div class="jour-container">
            <div class="left">Journey Details</div>
            <div class="right">
                <div class="journey-info-bar">
                    <div class="info-block">
                        <span class="info-label">Form No.</span>
                        <div class="input-group">
                            <select class="form-control" id="bookmarkName" onchange="updateButtonText()">
                                <option>Form 1</option>
                                <option>Form 2</option>
                                <option>Form 3</option>
                                <option>Form 4</option>
                                <option>Form 5</option>
                                <option>Form 6</option>
                                <option>Form 7</option>
                                <option>Form 8</option>
                                <option>Form 9</option>
                                <option>Form 10</option>
                            </select>
                        </div>
                    </div>
                    <div class="info-block">
                        <span class="info-label">Train No.</span>
                        <div class="input-group">
                            <input
                                class="form-control"
                                type="number"
                                id="trainNumber"
                                placeholder="17216"
                                maxlength="5"
                                pattern="[0-9]{5}"
                                oninput="this.value = this.value.replace(/\D/g, '').slice(0, 5)"
                                required/>
                        </div>
                    </div>
                    <div class="info-block">
                        <span class="info-label">Date of Journey</span>
                        <div class="mobile-input">
                            <span style="border-bottom: 1px solid #a0aec0;">🗓</span>
                            <input
                                type="text"
                                id="date"
                                class="form-control"
                                placeholder="Journey Date"
                                maxlength="10"
                                oninput="formatDate(this)"
                                required/>
                        </div>
                    </div>
                    <div class="info-block">
                        <span class="info-label">From Station</span>
                        <div class="input-group">
                            <input
                                type="text"
                                class="form-control"
                                id="source"
                                placeholder="KDP"
                                maxlength="6"
                                oninput="
                                    this.value=this.value.replace(/[^A-Za-z]/g,'');
                                    this.value = this.value.toUpperCase();
                                    document.getElementById('brdStn').value = this.value;"
                                required/>
                        </div>
                    </div>
                    <div class="info-block">
                        <span class="info-label">To Station</span>
                        <div class="input-group">
                            <input
                                type="text"
                                class="form-control"
                                placeholder="BZA"
                                id="destination"
                                maxlength="6"
                                oninput="
                                    this.value=this.value.replace(/[^A-Za-z]/g,'');
                                    this.value = this.value.toUpperCase();"
                                required/>
                        </div>
                    </div>
                </div>

                <div class="journey-info-bar2">
                    <div class="info-block">
                        <span class="info-label">Journey Class</span>
                        <div class="input-group">
                            <select class="form-control" id="coach">
                                <option>3A - THIRD AC</option>
                                <option>SL - SLEEPER</option>
                                <option>2A - SECOND AC</option>
                                <option>1A - FIRST AC</option>
                            </select>
                        </div>
                    </div>
                    <div class="info-block">
                        <span class="info-label">
                            <label class="switch">
                                <input type="checkbox" id="quotaToggle" />
                                <span class="slider"></span>
                            </label>Quota
                        </span>
                        <div class="input-group">
                            <select
                                id="quota"
                                class="form-control"
                                disabled>
                                <option>Tatkal</option>
                                <option>General</option>
                                <option>Premium Tatkal</option>
                            </select>
                        </div>
                    </div>
                    <div class="info-block">
                        <span class="info-label">No. of Passenger</span>
                        <div class="input-group">
                            <select id="count" onchange="createPassRows()" class="form-control">
                                <option>1</option>
                                <option>2</option>
                                <option>3</option>
                                <option>4</option>
                                <option>5</option>
                                <option>6</option>
                            </select>
                        </div>
                    </div>
                    <div class="info-block">
                        <span class="info-label">
                            <label class="switch">
                                <input 
                                    type="checkbox"
                                    id="brdStnToggle"/>
                                <span class="slider"></span>
                            </label>Boarding Station
                        </span>
                        <div class="input-group">
                            <input
                                type="text"
                                class="form-control"
                                id="brdStn"
                                placeholder="Boarding Station"
                                disabled/>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="passArea" class="passenger-section"></div>

        <div class="jour-container">
            <div class="left">Extras</div>
            <div class="right">
                <div class="extras-info-bar">
                    <div class="info-block">
                        <span class="info-label">Payment Mode</span>
                        <div class="input-group">
                            <select id="payment" class="form-control">
                                <option>Cash</option>
                                <option>UPI/BHIM QR</option>
                            </select>
                        </div>
                    </div>
                    <div class="info-block">
                        <span class="info-label">10 Digit Mobile</span>
                        <div class="mobile-input">
                            <span style="border-bottom: 1px solid #a0aec0;">📱</span>
                            <input
                                type="number"
                                id="mobile"
                                class="form-control"
                                maxlength="10"
                                placeholder="Mobile Number"
                                oninput="this.value=this.value.replace(/\\D/g,'').slice(0,10)"/>
                        </div>
                    </div>
                    <div class="info-block">
                        <div class="input-group">
                            <span class="info-label">
                                <label class="switch">
                                    <input
                                        type="checkbox"
                                        id="coachToggle"/>
                                    <span class="slider"></span>
                                </label>Coach no
                            </span>
                            <input
                                type="text"
                                id="wagon"
                                class="form-control"
                                maxlength="4"
                                placeholder="Coach No."
                                disabled/>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="buttonArea" class="button-Area">
            <button class="modern-btn " onclick="generate()">💾 Save</button>
            <button class="modern-btn " onclick="clearAll()">↺ Reset</button>
            <a id="bookmarkLink" href="#" draggable="false"></a>
        </div>
    </div>

    <details id="outputBox">
        <summary>Click here to Check Details</summary>
        <div class="textarea-container">
            <textarea id="output"></textarea>
        </div>
    </details>

    <!-- ===========================
    PASSWORD POPUP
    =========================== -->

    <div id="overlay">
        <div class="lock-box" id="box">
            <div class="lock-icon">🔒</div>
                <h2>Protected Page</h2>
                <input
                    type="password"
                    id="password"
                    placeholder="Password"
                    autocomplete="off">

                <button id="login-btn" onclick="unlock()">Unlock</button>

            <div id="error"></div>
        </div>
    </div>

<script>
    
    const PASSWORD="";   // Change here

    const input=document.getElementById("password");
    input.focus();

    const login_btn=document.getElementById("login-btn");
    login_btn.click();

    input.addEventListener("keydown",e=>{
        if(e.key==="Enter") 
            unlock();
        });

    function unlock()   {
        const value=input.value;
        if(value===PASSWORD){
            document.body.classList.remove("locked");
            document.body.classList.add("unlocked");
            document.getElementById("trainNumber").focus();
        }
        else {
            document.getElementById("error").innerText="Incorrect password";
            const box=document.getElementById("box");
            box.classList.remove("shake");
            void box.offsetWidth;
            box.classList.add("shake");
            input.select();
        }
    }

    function logout(){
        document.body.classList.remove("unlocked");
        document.body.classList.add("locked");

        const input = document.getElementById("password");

        input.value = "";
        setTimeout(() => {
            input.focus();
        }, 350);   // Match your overlay transition duration

        document.getElementById("error").innerText = "";
    }


    const coachToggle = document.getElementById("coachToggle");
    const wagonInput = document.getElementById("wagon");
    const brdStnToggle = document.getElementById("brdStnToggle");
    const brdStnInput = document.getElementById("brdStn");
    const quotaToggle = document.getElementById("quotaToggle");
    const quotaInput = document.getElementById("quota");
    
    quotaToggle.addEventListener("change", () => {
        if (quotaToggle.checked) {
            quotaInput.disabled = false;
            //wagonInput.focus();
        } else {
            quotaInput.disabled = true;
        }
    });
    coachToggle.addEventListener("change", () => {
        if (coachToggle.checked) {
            wagonInput.disabled = false;
            //wagonInput.focus();
        } else {
            wagonInput.value = "";
            wagonInput.disabled = true;
        }
    });
    brdStnToggle.addEventListener("change", () => {
        if (brdStnToggle.checked) {
            brdStnInput.disabled = false;
            //wagonInput.focus();
        } else {
            brdStnInput.value = "";
            brdStnInput.disabled = true;
        }
    });

    function toggleFood(toggle) {
        const checked = toggle.checked;

        // Check/Uncheck every toggle
        document.querySelectorAll(".food-toggle").forEach(cb => {
            cb.checked = checked;
        });

        // Enable/Disable every food select
        document.querySelectorAll(".food").forEach(select => {
            select.disabled = !checked;

            // Reset if disabled
            if (!checked) {
                select.selectedIndex = 0;
            }
        });
    }

    // Save previous value when dropdown gains focus
    document.addEventListener("focusin", function (e) {
        if (e.target.classList.contains("berth")) {
            e.target.dataset.previous = e.target.value;
        }
    });

    // Prevent selecting more than 2 Lower Berths
    document.addEventListener("change", function (e) {
        if (!e.target.classList.contains("berth")) return;

        const berths = [...document.querySelectorAll("#passArea .berth")];
        const lbCount = berths.filter(s => s.value === "Lower (LB)").length;

        if (lbCount > 2) {
            alert("You can select a maximum of 2 Lower Berths.");
            e.target.value = e.target.dataset.previous || "No Preference";
        }
    });

    document.addEventListener("DOMContentLoaded", function() {
        createPassRows();
        setTomorrowDate();
        updateButtonText();
    });

    function updateButtonText() {
        var select = document.getElementById("bookmarkName");
        var button = document.getElementById("bookmarkLink");
        var selectedText = select.options[select.selectedIndex].text;
        button.textContent = selectedText;
    }

    function createPassRows() {
        let n = parseInt(document.getElementById("count").value);
        let div = document.getElementById("passArea");
        div.innerHTML="";
        if(isNaN(n) || n<1) return;

        let htmlRows = [];
        for (let i = 1; i <= n; i++) {
            htmlRows.push(`
                <div class="passenger-row">
                    <div class="passenger-index">Psgn #0${i}</div>
                    <div class="passenger-inputs">
                        <div class="input-group">

                                    <span class="slider"></span>
                                </label>Food Option

        div.innerHTML = htmlRows.join('');

        // Auto-select berth preferences
        const berthOrder = [
            "Lower (LB)",
            "Lower (LB)",
            "Side Lower (SL)",
            "Side Upper (SU)",
            "Upper (UB)",
            "Middle (MB)"
        ];

        document.querySelectorAll("#passArea .berth").forEach((select, index) => {
            select.value = berthOrder[index] || "Middle (MB)";

    function setTomorrowDate() {
        const today = new Date();
        const tomorrow = new Date(today.getTime() + 24 * 60 * 60 * 1000);
        const ist = tomorrow.toLocaleDateString('en-IN', {
            timeZone: 'Asia/Kolkata',
            year: 'numeric',
            month: '2-digit',
            day: '2-digit'
        });
        //console.log(today);
        const [day, month,year] = ist.split("/");
        const formattedDate = `${day}.${month}.${year}`;
        document.getElementById('date').value = formattedDate;
    }

    function formatDate(input) {
        let value = input.value.replace(/\D/g, "").substring(0, 8);
        let formatted = "";
        if (value.length > 0)
            formatted += value.substring(0, 2);
        if (value.length > 2)
            formatted += "." + value.substring(2, 4);
        if (value.length > 4)
            formatted += "." + value.substring(4, 8);
        input.value = formatted;
    }

    function generate(){

        let coach=document.getElementById("coach").value; //class SL AC
        let train=document.getElementById("trainNumber").value;
        let source=document.getElementById("source").value;
        let destination=document.getElementById("destination").value;
        let doj=document.getElementById("date").value;
        let names=document.querySelectorAll(".name");
        let genders=document.querySelectorAll(".gender");
        let ages=document.querySelectorAll(".age");
        let berth=document.querySelectorAll(".berth");
        let food = document.querySelectorAll(".food");
        let payment=document.getElementById("payment").value;
        let mobile=document.getElementById("mobile").value;
        // Validate passenger details

        if (train === "") {
            alert("Please enter the Train Number");
            document.getElementById("trainNumber").focus();
            return;
        }

        if (!/^\d{5}$/.test(train)) {
            alert("Train Number must be exactly 5 digits.");
            document.getElementById("trainNumber").focus();
            return;
        }

        if (doj === "") {
            alert("Please enter Date Of Journey");
            document.getElementById("date").focus();
            return;
        }
        if (source === "") {
            alert("Please enter Source Station");
            document.getElementById("source").focus();
            return;
        }
        if (destination === "") {
            alert("Please enter Destination Station");
            document.getElementById("destination").focus();
            return;
        }

        if ( source === destination ) {
            alert("Source & Destination Cannot be the Same Station");
            document.getElementById("destination").focus();
            return;
        }

        for (let i = 0; i < names.length; i++) {

            let name = names[i].value.trim();
            let age = ages[i].value.trim();
            if (name === "") {
                alert("Please enter Name for Passenger " + (i + 1));
                names[i].focus();
                return;
            }

            if (name.length < 3 || name.length > 16) {
                alert("Passenger " + (i + 1) + " name must be between 3 and 16 characters.");
                names[i].focus();
                return;
            }

            if (!/^[A-Za-z ]+$/.test(name)) {
                alert("Passenger " + (i + 1) + " name can contain only alphabets.");
                names[i].focus();
                return;
            }

            if (age === "") {
                alert("Please enter Age for Passenger " + (i + 1));
                ages[i].focus();
                return;
            }

            let ageValue = parseInt(age);
            if (isNaN(ageValue) || ageValue < 1 || ageValue > 125) {
                alert("Passenger " + (i + 1) + " age must be between 1 and 125.");
                ages[i].focus();
                return;
            }
        }


        if (mobile !== "" && !/^\d{10}$/.test(mobile)) {
            alert("Mobile Number must be exactly 10 digits.");
            document.getElementById("mobile").focus();
            return;
        }

        let text="javascript: ( async function () {\n const passengers = [\n";
        for(let i=0;i<names.length;i++){
            text+=`    {\n`;
            text+=`        name: "${names[i].value}", gender: "${genders[i].value}", age: "${ages[i].value}", berth: "${berth[i].value}"\n`;

            // Print food only if enabled
            if (!food[i].disabled) {
                text += `, food: "${food[i].value}"`;
            }

            text+=`    }`;
            if(i!=names.length-1)
                text+=",";
                text+="\n";
        }
        text+=`];\n`;
        text+=`const TrainNo = "${train}";\n`;
        text+=`const JDate = "${doj}";\n`;
        text+=`const from = "${source}";\n`;
        text+=`const to = "${destination}";\n`;
        text+=`const coach = "${coach}";\n`;
        text+=`const mobileNumber = "${mobile}";\n`;
        text+=`const PaymentMode = "${payment}";`;
        text+="\n\n";
        const afterText = 
        `
        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        function setAngularValue(element, value) {
            if (!element) return;
                const setter = Object.getOwnPropertyDescriptor(
                HTMLInputElement.prototype,
                "value").set;

            setter.call(element, value);
            element.dispatchEvent(new Event("input", {
                bubbles: true
            }));
            element.dispatchEvent(new Event("change", {
                bubbles: true
            }));
        }

        async function selectMatOption(placeholder, optionText, index = 0) {
            const selects = [...document.querySelectorAll('mat-select')]
                .filter(el => el.getAttribute("placeholder") === placeholder);
            if (!selects[index]) return;
            selects[index].click();

            while (true) {
                const option = [...document.querySelectorAll(".mat-option-text")]
                    .find(el => el.textContent.trim() == optionText);
                if (option) {
                    option.click();
                    await sleep(200);
                    return;
                }
                await sleep(50);
            }
        }

        async function selectTrain(optionText) {
            const option = [...document.querySelectorAll(".mat-option-text")]
                .find(el => el.textContent.trim().startsWith(optionText));
            if (option) {
                option.click();
                await sleep(200);
                return;
            }
            await sleep(50);
        }

        async function fillTrain(TrainNo) {
            const tNO = document.querySelector('input[name="inputTrainNo"]');
            if (tNO) {
                setAngularValue(tNO, TrainNo);
                tNO.click();
                await selectTrain(TrainNo);
            }
        }

        async function fillDate(JDate) {
            const date = document.querySelector('input[name="journeyDate"]');
            if (date) {
                setAngularValue(date, JDate);
            }
        }

        async function Class(coach) {
            const desti = document.querySelector('input[data-placeholder="Journey To"]');
            desti.value = '';
            while (!desti.value.trim()) {
                await new Promise(resolve => setTimeout(resolve, 1000));
            }
            await selectMatOption("Class", coach);
        }

        async function nofPsng(passengers) {
            const nofPsng = document.querySelector('input[data-placeholder="No. of Passengers"]');
            setAngularValue(nofPsng, passengers.length);
            nofPsng.dispatchEvent(new Event("blur", {bubbles: true}));
        }
	
	    async function waitSource(from) {
            const source = document.querySelector('input[data-placeholder="Journey From"]');
            setAngularValue(source, from);
            source.click();
            await selectTrain(from);
        }

        async function waitDesti(to) {
            const desti = document.querySelector('input[data-placeholder="Journey To"]');
            while (!desti.value.trim()) {
                await new Promise(resolve => setTimeout(resolve, 1000));
            }
            setAngularValue(desti, to);
            desti.click();
            await selectTrain(to);
        }

        async function execute() {
            await fillTrain(TrainNo);
            await fillDate(JDate);
            await nofPsng(passengers);
            await Class(coach);
            await waitSource(from);
            await waitDesti(to);
        }

        async function psngForm(passengers, mobileNumber, PaymentMode) {
            const nameInputs = document.querySelectorAll('input[formcontrolname="psgnName"]');
            const ageInputs = document.querySelectorAll('input[formcontrolname="psgnAge"]');
            passengers.forEach((p, i) => {
                if (nameInputs[i])
                    setAngularValue(nameInputs[i], p.name.toUpperCase());

                if (ageInputs[i])
                    setAngularValue(ageInputs[i], p.age);
            });

            const mobileInput = document.querySelector('input[formcontrolname="mobileNumber"]');
            if (mobileInput) {
                setAngularValue(mobileInput, mobileNumber)
            }

            for (let i = 0; i < passengers.length; i++) {
                await selectMatOption("Gender", passengers[i].gender, i);
            }
            
            //if ("food" in passengers[0]) {
            //    for (let i = 0; i < passengers.length; i++) {
            //        await selectMatOption("Food Choice", passengers[i].food, i);
            //    }
            //}

            await selectMatOption("PAYMENT TYPE", PaymentMode);
        }

        async function checkAvailabilityAndClickNext() {

            function clickNext() {
                const btn = document.querySelector('button[type="submit"].mat-raised-button.mat-accent');

                if (btn) {
                    btn.click();
                    return;
                }
                const next = [...document.querySelectorAll("span.mat-button-wrapper")]
                    .find(el => el.textContent.trim() === "Next");

                next?.closest("button")?.click();
            }

            function processStatus() {
                const status = [...document.querySelectorAll("span")]
                    .find(el => el.textContent.includes("AVAILABILITY STATUS"));

                if (!status) return null; // Not loaded yet

                const text = status.textContent.toUpperCase();
                if (/\bAVAILABLE\b/i.test(text)) {
                    clickNext();
                    return true;
                }

                console.log("Not Available");
                return false;
            }

            const result = processStatus();
            if (result !== null) 
                return result;

            return new Promise(resolve => {

                const observer = new MutationObserver(() => {
                    const result = processStatus();
                    if (result !== null) {
                        observer.disconnect();
                        resolve(result);
                    }
                });

                observer.observe(document.body, {
                    childList: true,
                    subtree: true,
                    characterData: true
                });

            });
        }

        await execute();
        await psngForm(passengers, mobileNumber, PaymentMode);
        await checkAvailabilityAndClickNext();

        })();
        `;
        
        text += afterText;

        let bookmarkName = document.getElementById("bookmarkName").value.trim();
        if (bookmarkName === "") {
            alert("Please enter Bookmark Name.");
            document.getElementById("bookmarkName").focus();
            return;
        }
        let link = document.getElementById("bookmarkLink");
        link.href = text;
        link.setAttribute('draggable', 'true');

        document.getElementById("output").value = text;
        document.getElementById("outputBox").style.display = "block";
    }

    function clearAll() {
        const output = document.getElementById("output");
        const outputBox = document.getElementById("outputBox");
        const bookmarkLink = document.getElementById("bookmarkLink");
        
        document.querySelectorAll("input").forEach(input => {
        if (input.type === "checkbox" || input.type === "radio") {
            input.checked = input.defaultChecked;
        } else {
            input.value = "";
        }});
        document.querySelectorAll("select").forEach(select => {
        select.selectedIndex = 0;
        });
        document.querySelectorAll("textarea").forEach(textarea => {
        textarea.value = "";
        });

        createPassRows();
        setTomorrowDate();
        
        output.value = "";
        outputBox.open= false;
        outputBox.style.display = "none";

        bookmarkLink.href = "#";
        bookmarkLink.setAttribute('draggable', 'false');
        updateButtonText();
    }
