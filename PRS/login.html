<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>Protected Page</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,Arial,sans-serif;
}

/* ===========================
   YOUR WEBPAGE
=========================== */

body{
    background:#eef2f7;
}

/* Put your whole webpage inside this */
#page{
    min-height:100vh;
    padding:40px;
    transition:.45s;
}

/* Locked state */
body.locked #page{
    filter:blur(16px);
    user-select:none;
    pointer-events:none;
}

/* ===========================
   OVERLAY
=========================== */

#overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.35);
    backdrop-filter:blur(3px);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:99999;
    transition:.35s;
}

body.unlocked #overlay{
    opacity:0;
    visibility:hidden;
}

/* ===========================
   POPUP
=========================== */

.lock-box{
    width:360px;
    padding:35px;
    border-radius:22px;

    background:rgba(255,255,255,.18);

    border:1px solid rgba(255,255,255,.35);

    backdrop-filter:blur(20px);

    box-shadow:
    0 20px 60px rgba(0,0,0,.25);

    text-align:center;

    animation:popup .45s ease;
}

@keyframes popup{
from{
transform:translateY(30px) scale(.9);
opacity:0;
}
to{
transform:none;
opacity:1;
}
}

.lock-icon{
    font-size:60px;
    margin-bottom:15px;
}

h2{
    color:white;
    margin-bottom:8px;
    font-weight:600;
}

p{
    color:#f1f1f1;
    font-size:14px;
    margin-bottom:25px;
}

/* ===========================
   INPUT
=========================== */

input{
    width:100%;
    height:48px;
    border:none;
    outline:none;
    border-radius:12px;
    padding:0 16px;
    font-size:16px;
    background:white;
    margin-bottom:18px;
}

/* ===========================
   BUTTON
=========================== */

button{
    width:100%;
    height:48px;
    border:none;
    border-radius:12px;
    cursor:pointer;

    color:white;
    font-size:16px;
    font-weight:600;

    background:linear-gradient(135deg,#0078ff,#00b4ff);

    transition:.25s;
}

button:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 25px rgba(0,120,255,.35);
}

#error{
    margin-top:14px;
    color:#ffb3b3;
    height:18px;
    font-size:14px;
}

/* Shake animation */

.shake{
animation:shake .35s;
}

@keyframes shake{

10%{transform:translateX(-8px);}
20%{transform:translateX(8px);}
30%{transform:translateX(-8px);}
40%{transform:translateX(8px);}
50%{transform:translateX(-6px);}
60%{transform:translateX(6px);}
70%{transform:translateX(-4px);}
80%{transform:translateX(4px);}
100%{transform:none;}

}

</style>

</head>

<body class="locked">

<!-- ===========================
YOUR WEBPAGE STARTS HERE
=========================== -->

<div id="page">

<h1>My Premium Webpage</h1>

<br>

<p>
Replace this with your own webpage.
Everything inside this div becomes blurred until unlocked.
</p>

<br><br>

<button>Example Button</button>

</div>

<!-- ===========================
PASSWORD POPUP
=========================== -->

<div id="overlay">

<div class="lock-box" id="box">

<div class="lock-icon">🔒</div>

<h2>Protected Page</h2>

<p>Enter password to continue</p>

<input
type="password"
id="password"
placeholder="Password"
autocomplete="off">

<button onclick="unlock()">
Unlock
</button>

<div id="error"></div>

</div>

</div>

<script>

const PASSWORD="1234";   // Change here

const input=document.getElementById("password");

input.focus();

input.addEventListener("keydown",e=>{
if(e.key==="Enter") unlock();
});

function unlock(){

const value=input.value;

if(value===PASSWORD){

document.body.classList.remove("locked");
document.body.classList.add("unlocked");

}else{

document.getElementById("error").innerText="Incorrect password";

const box=document.getElementById("box");

box.classList.remove("shake");

void box.offsetWidth;

box.classList.add("shake");

input.select();

}

}

</script>

</body>
</html>
